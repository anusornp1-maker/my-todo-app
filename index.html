<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sync To-Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <div id="auth-section" class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl text-center mb-6">
        <h1 class="text-3xl font-bold mb-6">My Tasks</h1>
        <button id="login-btn" class="bg-white text-slate-900 px-6 py-3 rounded-full font-bold flex items-center justify-center w-full hover:bg-slate-200 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6 mr-2">
            เข้าสู่ระบบด้วย Google
        </button>
        <div id="user-info" class="hidden">
            <p class="mb-4 text-slate-400">ยินดีต้อนรับ, <span id="user-name" class="text-white font-bold"></span></p>
            <button id="logout-btn" class="text-sm text-red-400 hover:underline">ออกจากระบบ</button>
        </div>
    </div>

    <div id="todo-section" class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-2xl hidden">
        <div class="flex gap-2 mb-6">
            <input type="text" id="todo-input" placeholder="เพิ่มสิ่งที่ต้องทำ..." class="flex-1 bg-slate-700 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500 outline-none">
            <button id="add-btn" class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-xl font-bold transition">เพิ่ม</button>
        </div>
        <ul id="todo-list" class="space-y-3"></ul>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. แปะ firebaseConfig ที่เพื่อนก๊อปมาวางตรงนี้ (Replace this)
        const firebaseConfig = {
    apiKey: "AIzaSyC_JN8AL9L0M0eulfbf8cXHvcZT0q0-Cug",
    authDomain: "my-todo-app-d6eb1.firebaseapp.com",
    projectId: "my-todo-app-d6eb1",
    storageBucket: "my-todo-app-d6eb1.firebasestorage.app",
    messagingSenderId: "172806062786",
    appId: "1:172806062786:web:efad1fef88a5ef2717f15b"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const todoSection = document.getElementById('todo-section');
        const todoList = document.getElementById('todo-list');

        // Login / Logout Logic
        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                todoSection.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                loadTodos(user.uid);
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                todoSection.classList.add('hidden');
                todoList.innerHTML = '';
            }
        });

        // Sync Data Logic
        async function loadTodos(uid) {
            const q = query(collection(db, "todos"), where("uid", "==", uid));
            onSnapshot(q, (snapshot) => {
                todoList.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.className = "bg-slate-700 p-4 rounded-xl flex justify-between items-center animate-fade-in";
                    li.innerHTML = `
                        <span class="${data.done ? 'line-through text-slate-500' : ''}">${data.text}</span>
                        <div class="flex gap-2">
                            <button onclick="toggleDone('${doc.id}', ${data.done})" class="text-green-400"><i class="fas fa-check"></i></button>
                            <button onclick="deleteTodo('${doc.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    todoList.appendChild(li);
                });
            });
        }

        window.addTodo = async () => {
            const input = document.getElementById('todo-input');
            if (input.value.trim() && auth.currentUser) {
                await addDoc(collection(db, "todos"), {
                    text: input.value,
                    done: false,
                    uid: auth.currentUser.uid,
                    createdAt: Date.now()
                });
                input.value = '';
            }
        };
        document.getElementById('add-btn').onclick = window.addTodo;

        window.toggleDone = (id, currentStatus) => updateDoc(doc(db, "todos", id), { done: !currentStatus });
        window.deleteTodo = (id) => deleteDoc(doc(db, "todos", id));
    </script>
</body>
</html>
