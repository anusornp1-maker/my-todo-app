<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c2c; color: white; font-family: sans-serif; }
        .card { background-color: #24273d; border-radius: 20px; padding: 2rem; width: 100%; max-width: 450px; }
        .btn-add { background: linear-gradient(135deg, #a388ee 0%, #5d44ff 100%); padding: 0.5rem 1.5rem; border-radius: 10px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="card shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-6">My Tasks</h1>

        <div id="auth-section" class="text-center mb-6">
            <p id="user-info" class="mb-2 text-sm text-gray-400">Loading...</p>
            <button id="loginBtn" class="btn-add hidden">Login with Google</button>
            <button id="logoutBtn" class="hidden text-red-400 text-xs underline mt-2">Logout</button>
        </div>

        <div id="todo-section" class="hidden">
            <div class="flex gap-2 mb-6">
                <input type="text" id="todoInput" placeholder="เพิ่มสิ่งที่ต้องทำ..." class="flex-1 bg-[#35394f] border-none rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-[#a388ee] outline-none">
                <button id="addBtn" class="btn-add">เพิ่ม</button>
            </div>
            <ul id="todoList" class="todo-list"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_JN8AL9L0M0eulfbf8cXHvcZT0q0-Cug",
            authDomain: "my-todo-app-d6eb1.firebaseapp.com",
            projectId: "my-todo-app-d6eb1",
            storageBucket: "my-todo-app-d6eb1.appspot.com",
            messagingSenderId: "172806062786",
            appId: "1:172806062786:web:6e326c71c4c11f7c756285"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            // --- ส่วนป้องกันการเปิดในแอป (Anti-In-App Browser) ---
            const isLine = navigator.userAgent.includes('Line');
            const isFB = /FBAN|FBAV/i.test(navigator.userAgent);
            
            if (isLine && !window.location.search.includes('openExternalBrowser=1')) {
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'openExternalBrowser=1';
                return; 
            } else if (isFB || isLine) {
                if (!document.getElementById('anti-in-app-banner')) {
                    document.body.insertAdjacentHTML('afterbegin', `
                        <div id="anti-in-app-banner" style="background: #ff4444; color: white; text-align: center; padding: 10px; font-size: 14px; position: sticky; top: 0; z-index: 9999;">
                            ⚠️ เพื่อให้ Login ได้ กรุณากดปุ่ม <b>⋮</b> หรือ <b>...</b> แล้วเลือก "เปิดด้วยเบราว์เซอร์อื่น" [Open in Browser]
                        </div>
                    `);
                }
            }
            // ------------------------------------------------

            if (user) {
                document.getElementById('user-info').textContent = `Logged in as: ${user.displayName}`;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('todo-section').classList.remove('hidden');
                window.currentUser = user;
                loadTasks();
            } else {
                document.getElementById('user-info').textContent = "Please login to see your tasks";
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('todo-section').classList.add('hidden');
                window.currentUser = null;
            }
        });

        window.login = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (error) { console.error(error); }
        };

        window.logout = () => signOut(auth);

        window.addTask = async () => {
            const input = document.getElementById('todoInput');
            if (input.value.trim() && window.currentUser) {
                await addDoc(collection(db, "todos"), {
                    text: input.value,
                    completed: false,
                    createdAt: Date.now(),
                    userId: window.currentUser.uid,
                    userName: window.currentUser.displayName
                });
                input.value = '';
            }
        };

        function loadTasks() {
            const q = query(collection(db, "todos"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const todoList = document.getElementById('todoList');
                todoList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const task = docSnap.data();
                    const id = docSnap.id;
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between bg-[#35394f] mb-3 p-4 rounded-xl shadow-sm';
                    li.innerHTML = `
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="window.toggleTask('${id}', ${task.completed})" class="w-5 h-5 accent-[#a388ee]">
                            <span class="${task.completed ? 'line-through text-gray-500' : 'text-white'} text-lg">${task.text}</span>
                        </div>
                        <button onclick="window.deleteTask('${id}')" class="text-gray-500 hover:text-red-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    `;
                    todoList.appendChild(li);
                });
            });
        }

        window.toggleTask = async (id, currentStatus) => {
            await updateDoc(doc(db, "todos", id), { completed: !currentStatus });
        };

        window.deleteTask = async (id) => {
            if (confirm("จะลบใช่ไหม?")) { await deleteDoc(doc(db, "todos", id)); }
        };

        document.getElementById('loginBtn').onclick = window.login;
        document.getElementById('logoutBtn').onclick = window.logout;
        document.getElementById('addBtn').onclick = window.addTask;
    </script>
</body>
</html>
